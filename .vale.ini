StylesPath = vale
MinAlertLevel = suggestion

Vocab = SuperOffice

Packages = Microsoft, MDX

[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Vale, Microsoft, Formatting

# Translated content: real spellcheck via Hunspell dictionaries (see
# vale/config/dictionaries/NOTICE.md), plus formatting — no English
# Microsoft prose/voice rules, those don't apply to non-English text.
[da/**]
BasedOnStyles = Formatting, DA

[de/**]
BasedOnStyles = Formatting, DE

[nl/**]
BasedOnStyles = Formatting, NL

# "no" folder = Norwegian Bokmal (nb_NO), the standard written form
[no/**]
BasedOnStyles = Formatting, NB

[sv/**]
BasedOnStyles = Formatting, SV

# Generated reference content: no prose linting at all
[{en/api/archive-providers/reference,en/api/mdo-providers/reference,en/api/reference,en/automation/crmscript/reference,en/database/tables,release-notes/database}/**]
BasedOnStyles =
